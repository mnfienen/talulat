theme: minima
title: TalulaT - a biking blog
author: Mike and Chandra
description: chronicles of tandem miles
url: "https://mnfienen.github.io"   # your user/site root
baseurl: "/talulat"                 # project subpath
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

sass:
  sass_dir: assets

collections:
  topics:
    output: true
    permalink: /topics/:name/

defaults:
  - scope:
      path: ""
      type: topics
    values:
      layout: topic    # we'll create this layout below
